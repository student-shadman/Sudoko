<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="sudoku-app">
    <header>
      <h1>Sudoku Game</h1>
      <button id="theme-toggle" aria-label="Toggle Theme">Toggle Theme</button>
    </header>

    <div class="controls">
      <select id="difficulty" aria-label="Select Difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="new-game">New Game</button>
      <button id="check">Check</button>
      <button id="hint">Hint</button>
      <button id="reset">Reset</button>
      <button id="save">Save</button>
      <button id="load">Load</button>
      <div class="timer">Time: <span id="timer">00:00</span></div>
    </div>

    <div id="sudoku-board" class="board" role="grid" aria-label="Sudoku Board"></div>

    <footer>
      <p>Built with HTML, CSS & JavaScript</p>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
